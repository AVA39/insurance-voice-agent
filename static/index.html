<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保険営業サポートAI | AVANTIS</title>
  <style>
    :root {
      --navy: #0f2b4c;
      --navy2: #1a4a7a;
      --orange: #f4721e;
      --orange2: #ff9a4a;
      --bg: #f5f7fa;
      --white: #ffffff;
      --text: #1a1a2e;
      --text2: #666677;
      --border: #dde3ef;
      --green: #2e7d32;
      --red: #e53935;
      --radius: 18px;
      --shadow: 0 4px 24px rgba(15,43,76,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .hdr {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      color: var(--white);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }
    .hdr-icon {
      width: 40px; height: 40px;
      background: var(--orange);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .hdr-title { font-size: 16px; font-weight: 700; letter-spacing: 0.03em; }
    .hdr-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .hdr-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      white-space: nowrap;
    }

    /* ─── Chat area ─── */
    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 14px;
      word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-ai {
      background: var(--white);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
      align-self: flex-start;
    }
    .bubble-ai .sender {
      font-size: 11px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bubble-ai .sender::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--orange);
      border-radius: 50%;
    }

    .bubble-user {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      color: var(--white);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      background: var(--orange);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* ─── Input area ─── */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
      flex-shrink: 0;
      box-shadow: 0 -2px 12px rgba(15,43,76,0.06);
    }

    .status-bar {
      min-height: 20px;
      font-size: 12px;
      color: var(--orange);
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
      transition: all 0.2s;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #inputField {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg);
    }
    #inputField:focus { border-color: var(--navy2); background: var(--white); }
    #inputField::placeholder { color: #aab; }

    .btn {
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #sendBtn {
      background: var(--navy);
      color: var(--white);
      padding: 10px 18px;
      font-size: 13px;
    }
    #sendBtn:hover:not(:disabled) { background: var(--navy2); }

    #micBtn {
      width: 48px; height: 48px;
      background: var(--bg);
      border: 2px solid var(--border);
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    #micBtn:hover:not(:disabled) { border-color: var(--orange); background: #fff5ef; }
    #micBtn.recording {
      background: var(--red);
      border-color: var(--red);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.5); }
      50%      { box-shadow: 0 0 0 14px rgba(229,57,53,0); }
    }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text2);
      margin-top: 8px;
    }
    .hint kbd {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
    }

    /* voice unavailable notice */
    #voiceNote {
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      margin-top: 6px;
    }

    /* ─── Scrollbar ─── */
    .chat-wrap::-webkit-scrollbar { width: 5px; }
    .chat-wrap::-webkit-scrollbar-track { background: transparent; }
    .chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Update button & last-updated ─── */
    .hdr-update-area {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    #updateBtn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.30);
      color: var(--white);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #updateBtn:hover { background: rgba(255,255,255,0.30); }
    #updateBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #updateBtn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #lastUpdatedLabel {
      font-size: 10px;
      opacity: 0.65;
      white-space: nowrap;
    }

    /* ─── Toast notification ─── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      max-width: 90vw;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { background: var(--green); }
    #toast.error   { background: #c62828; }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Header -->
<div class="hdr">
  <div class="hdr-icon">🛡️</div>
  <div>
    <div class="hdr-title">保険営業サポートAI</div>
    <div class="hdr-sub">AVANTIS — 営業担当者専用</div>
  </div>
  <div class="hdr-update-area">
    <button id="updateBtn" onclick="triggerUpdate()" title="最新の保険情報をWebから取得して知識を更新">
      🔄 知識を更新
    </button>
    <span id="lastUpdatedLabel">最終更新: 読込中...</span>
  </div>
</div>

<!-- Chat -->
<div class="chat-wrap" id="chatWrap">
  <!-- welcome message injected by JS -->
</div>

<!-- Input -->
<div class="input-area">
  <div class="status-bar" id="statusBar"></div>
  <div class="input-row">
    <input
      type="text"
      id="inputField"
      placeholder="質問を入力、または🎤で音声入力"
      autocomplete="off"
    />
    <button class="btn" id="sendBtn" onclick="sendFromInput()">送信</button>
    <button class="btn" id="micBtn" onclick="toggleMic()" title="音声入力 (Space)">🎤</button>
  </div>
  <div class="hint">
    <kbd>Space</kbd> キーでマイクのオン/オフ切替（入力欄にフォーカスがない場合）
  </div>
  <div id="voiceNote"></div>
</div>

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  const MAX_HISTORY = 10;
  let conversationHistory = [];
  let isRecording = false;
  let isSpeaking = false;
  let recognition = null;

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const chatWrap   = document.getElementById('chatWrap');
  const inputField = document.getElementById('inputField');
  const sendBtn    = document.getElementById('sendBtn');
  const micBtn     = document.getElementById('micBtn');
  const statusBar  = document.getElementById('statusBar');
  const voiceNote  = document.getElementById('voiceNote');

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function setStatus(msg) {
    statusBar.textContent = msg;
  }

  function scrollToBottom() {
    chatWrap.scrollTo({ top: chatWrap.scrollHeight, behavior: 'smooth' });
  }

  function appendMessage(role, text) {
    const bubble = document.createElement('div');
    bubble.className = role === 'user' ? 'bubble bubble-user' : 'bubble bubble-ai';
    if (role === 'assistant') {
      bubble.innerHTML = '<div class="sender">AVANTIS AI</div>' + escapeHtml(text);
    } else {
      bubble.textContent = text;
    }
    chatWrap.appendChild(bubble);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'bubble bubble-ai';
    el.id = 'typingIndicator';
    el.innerHTML = '<div class="sender">AVANTIS AI</div><div class="typing-indicator"><span></span><span></span><span></span></div>';
    chatWrap.appendChild(el);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function trimHistory() {
    if (conversationHistory.length > MAX_HISTORY) {
      conversationHistory = conversationHistory.slice(conversationHistory.length - MAX_HISTORY);
    }
  }

  function setInputLock(locked) {
    inputField.disabled = locked;
    sendBtn.disabled = locked;
    if (!locked && !isRecording) micBtn.disabled = false;
  }

  // ─── API ──────────────────────────────────────────────────────────────────
  async function sendMessage(text) {
    text = text.trim();
    if (!text) return;

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    inputField.value = '';
    setInputLock(true);
    micBtn.disabled = true;
    setStatus('AIが考えています...');
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'APIエラー');
      }

      const data = await res.json();
      const reply = data.reply;

      removeTyping();
      appendMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
      trimHistory();
      setStatus('');
      speak(reply);

    } catch (err) {
      removeTyping();
      setStatus('エラー: ' + err.message);
      appendMessage('assistant', '申し訳ありません。エラーが発生しました。もう一度お試しください。');
    } finally {
      setInputLock(false);
      micBtn.disabled = false;
    }
  }

  function sendFromInput() {
    sendMessage(inputField.value);
  }

  // ─── TTS (Stage 3) ────────────────────────────────────────────────────────
  let jpVoice = null;

  function loadVoices() {
    const voices = window.speechSynthesis.getVoices();
    jpVoice = voices.find(v => v.lang === 'ja-JP') ||
              voices.find(v => v.lang.startsWith('ja')) ||
              null;
  }

  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  }

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang  = 'ja-JP';
    utterance.rate  = 0.95;
    utterance.pitch = 1.0;
    if (jpVoice) utterance.voice = jpVoice;

    utterance.onstart = () => { isSpeaking = true; setStatus('音声を再生中...'); };
    utterance.onend   = () => { isSpeaking = false; setStatus(''); };
    utterance.onerror = () => { isSpeaking = false; setStatus(''); };

    window.speechSynthesis.speak(utterance);
  }

  function stopSpeaking() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    isSpeaking = false;
    setStatus('');
  }

  // ─── STT (Stage 1) ────────────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    micBtn.style.display = 'none';
    voiceNote.textContent = '音声入力はChrome / Edgeで利用できます。テキスト入力をご使用ください。';
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹';
      setStatus('音声認識中... 話しかけてください');
    };

    recognition.onresult = (event) => {
      let transcript = '';
      let isFinal = false;
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
        if (event.results[i].isFinal) isFinal = true;
      }
      inputField.value = transcript;
      if (isFinal) {
        stopRecognition();
        sendMessage(transcript);
      }
    };

    recognition.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      if (event.error === 'no-speech') {
        setStatus('音声が検出されませんでした。もう一度お試しください。');
      } else if (event.error === 'not-allowed') {
        setStatus('マイクの使用が許可されていません。ブラウザの設定を確認してください。');
      } else {
        setStatus('音声認識エラー: ' + event.error);
      }
      stopRecognition();
    };

    recognition.onend = () => {
      if (isRecording) stopRecognition();
    };
  }

  function stopRecognition() {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    if (recognition) {
      try { recognition.stop(); } catch (_) {}
    }
  }

  function toggleMic() {
    if (!recognition) return;

    if (isSpeaking) stopSpeaking();

    if (isRecording) {
      setStatus('');
      stopRecognition();
    } else {
      try {
        recognition.start();
      } catch (e) {
        setStatus('マイクの起動に失敗しました: ' + e.message);
      }
    }
  }

  // ─── Keyboard shortcut ───────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && document.activeElement !== inputField && recognition) {
      e.preventDefault();
      toggleMic();
    }
    if (e.code === 'Enter' && document.activeElement === inputField) {
      e.preventDefault();
      sendFromInput();
    }
  });

  // ─── Knowledge update ────────────────────────────────────────────────────
  const updateBtn         = document.getElementById('updateBtn');
  const lastUpdatedLabel  = document.getElementById('lastUpdatedLabel');
  const toast             = document.getElementById('toast');
  let _pollTimer          = null;

  function showToast(msg, type = '', duration = 4000) {
    toast.textContent = msg;
    toast.className   = 'show' + (type ? ' ' + type : '');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.className = ''; }, duration);
  }

  function formatDate(isoStr) {
    if (!isoStr) return '—';
    try {
      const d = new Date(isoStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } catch { return isoStr; }
  }

  async function fetchUpdateStatus() {
    try {
      const res  = await fetch('/api/update-status');
      const data = await res.json();
      const label = data.last_updated
        ? `最終更新: ${formatDate(data.last_updated)}`
        : '最終更新: 未実行';
      lastUpdatedLabel.textContent = label;
      return data;
    } catch { return null; }
  }

  function startPolling() {
    if (_pollTimer) return;
    _pollTimer = setInterval(async () => {
      const data = await fetchUpdateStatus();
      if (!data) return;
      if (data.status === 'updating') {
        setStatus('🔄 ' + data.message);
        updateBtn.disabled = true;
      } else {
        clearInterval(_pollTimer);
        _pollTimer = null;
        updateBtn.disabled = false;
        updateBtn.textContent = '🔄 知識を更新';
        setStatus('');
        if (data.status === 'success') {
          showToast('✅ ' + data.message, 'success', 5000);
          appendMessage('assistant',
            `知識ベースが最新情報に自動更新されました（${formatDate(data.last_updated)}）。\n` +
            '最新の保険情報に基づいた回答が可能です。'
          );
        } else if (data.status === 'error') {
          showToast('⚠️ ' + data.message, 'error', 6000);
        }
      }
    }, 2500);
  }

  async function triggerUpdate() {
    updateBtn.disabled    = true;
    updateBtn.textContent = '🔄 更新中...';
    setStatus('知識ベースの更新を開始します...');
    try {
      const res  = await fetch('/api/update', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        showToast('🔍 Web検索でAIが最新情報を収集しています。数分かかることがあります。', '', 6000);
        startPolling();
      } else {
        showToast('⚠️ ' + data.message, 'error');
        updateBtn.disabled    = false;
        updateBtn.textContent = '🔄 知識を更新';
        setStatus('');
      }
    } catch (e) {
      showToast('⚠️ 更新リクエストに失敗しました', 'error');
      updateBtn.disabled    = false;
      updateBtn.textContent = '🔄 知識を更新';
      setStatus('');
    }
  }

  // ─── Welcome message ──────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    appendMessage('assistant',
      'こんにちは！保険営業サポートAIです。\n' +
      'がん保険・先進医療特約・医療保険・生命保険に関するご質問に、音声でもテキストでもお答えします。\n' +
      '例：「がん保険の待機期間を教えてください」「先進医療特約の保険料はいくらですか？」\n' +
      '右上の「🔄 知識を更新」で最新のWeb情報を取り込めます。起動1分後に自動更新が始まります。'
    );
    // 起動時に最終更新日時を表示
    const status = await fetchUpdateStatus();
    if (status && status.status === 'updating') startPolling();
  });
</script>
</body>
</html>
